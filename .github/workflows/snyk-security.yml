name: Secure CI/CD Pipeline

env:
  IMAGE_NAME: secure-api
  GHCR_OWNER: upal113
  VERSION: 1.0.${{ github.run_number }}

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Stage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./app
        run: npm install

  test:
    name: Test Stage
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./app
        run: npm install

      - name: Execute Unit Tests
        working-directory: ./app
        run: npm test

  security:
    name: Security Scan Stage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./app
        run: npm install

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Dependency Scan
        run: snyk test --file=app/package.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # Continue on error
        continue-on-error: true

      - name: Build Docker Image
        run: docker build -t secure-api -f docker/Dockerfile .

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Container Scan
        run: snyk container test secure-api --file=docker/Dockerfile
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # Continue on error
        continue-on-error: true

  deploy:
    name: Deploy Stage
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t secure-api -f docker/Dockerfile .

      - name: Authenticate to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Tag Docker Image
        run: docker tag $IMAGE_NAME ghcr.io/$GHCR_OWNER/$IMAGE_NAME:$VERSION

      - name: Push Docker Image
        run: docker push ghcr.io/$GHCR_OWNER/$IMAGE_NAME:$VERSION